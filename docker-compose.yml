services:
  postgres:
    image: postgres:16-alpine
    container_name: grads-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: grads
      POSTGRES_PASSWORD: grads_secret
      POSTGRES_DB: grads_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grads -d grads_system"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
