services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: grads
      POSTGRES_PASSWORD: grads_secret
      POSTGRES_DB: grads_system
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
